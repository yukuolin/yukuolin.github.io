name: Update market data

on:
  schedule:
    # TWSE OpenAPI 於收盤當晚至次日清晨間更新，多排幾個時段重試；
    # 腳本內建資料日期一致性檢查，來源尚未更新時會自動放棄、不產生錯誤資料。
    # 分鐘取非整點值：GitHub 會在尖峰時段丟棄部分整點排程（2026-07-13 三個時段全數未觸發）。
    # 台北時間（UTC+8）：22:07、隔日 05:37、06:37、10:37
    - cron: "7 14 * * 1-5"
    - cron: "37 21 * * 1-5"
    - cron: "37 22 * * 1-5"
    - cron: "37 2 * * 2-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch market data
        run: python scripts/fetch_market_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: 更新每日市場資料"
            git push
          fi
